<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DataPraat — Logo Exploration</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #FCFBF8;
    --bg-soft: #F3F2EE;
    --surface: #FFFFFF;
    --ink: #2A2724;
    --ink-soft: #5E5A53;
    --ink-mute: #8F8A80;
    --ink-faint: #B3ADA3;
    --line: #E5E3DD;
    --line-strong: #D4D1CB;
    --primary: #4338CA;
    --primary-soft: #6366F1;
    --primary-tint: #EEF2FF;
    --primary-ink: #3151B0;
    --accent-gold: #A8702A;
    --accent-green: #5E8A6D;
    --f-sans: "Inter", ui-sans-serif, system-ui, sans-serif;
    --f-serif: "Fraunces", ui-serif, Georgia, serif;
    --f-mono: "JetBrains Mono", ui-monospace, Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); font-family: var(--f-sans); color: var(--ink); }

  /* shared artboard bits */
  .lb {
    width: 560px;
    height: 420px;
    background: var(--surface);
    display: grid;
    grid-template-rows: 1fr auto auto;
    position: relative;
  }
  .lb-stage {
    display: grid;
    place-items: center;
    padding: 28px;
    min-height: 0;
    overflow: hidden;
  }
  .lb-mark-row {
    display: flex;
    align-items: center;
    gap: 28px;
  }
  .lb-foot {
    border-top: 1px solid var(--line);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    background: var(--bg);
  }
  .lb-foot-l { display: flex; align-items: center; gap: 12px; }
  .lb-foot-r { display: flex; align-items: center; gap: 10px; }
  .lb-tag {
    font-family: var(--f-mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }
  .lb-note {
    font-size: 11.5px;
    color: var(--ink-soft);
    line-height: 1.4;
    max-width: 320px;
    font-family: var(--f-sans);
  }
  .lb-note b { color: var(--ink); font-weight: 500; }

  /* favicon chip — 24px preview */
  .lb-favi {
    width: 24px; height: 24px;
    border-radius: 4px;
    overflow: hidden;
    display: grid; place-items: center;
    flex-shrink: 0;
  }

  /* wordmark defaults */
  .wm-inter {
    font-family: var(--f-sans);
    font-weight: 600;
    letter-spacing: -0.025em;
    color: var(--ink);
  }
  .wm-inter .p { color: var(--primary); }
  .wm-fraunces {
    font-family: var(--f-serif);
    font-weight: 500;
    letter-spacing: -0.01em;
    color: var(--ink);
  }

  /* on-dark variant footer */
  .lb-dark .lb-stage.dark {
    background: var(--ink);
    color: #FAF7EF;
    border-radius: 0;
  }

  /* small stripe bg for the hero banner */
  .hero {
    max-width: 1280px;
    margin: 0 auto;
    padding: 48px 48px 8px;
  }
  .hero h1 {
    font-family: var(--f-sans);
    font-weight: 600;
    font-size: 26px;
    letter-spacing: -0.02em;
    margin: 0 0 6px;
  }
  .hero p {
    color: var(--ink-soft);
    font-size: 13.5px;
    line-height: 1.55;
    margin: 0 0 4px;
    max-width: 720px;
  }
  .hero .meta {
    margin-top: 18px;
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    font-family: var(--f-mono);
    font-size: 11px;
    color: var(--ink-mute);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .hero .meta .sw {
    display: inline-flex; align-items: center; gap: 6px;
  }
  .hero .meta .sw span {
    width: 10px; height: 10px; border-radius: 2px; display: inline-block;
  }

  /* reusable styles for individual concepts declared next to their components */
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel">
// ==========================================================
// Shared wrapper — every concept uses this
// ==========================================================
const LogoBoard = ({ children, note, small, wordmark = "normal", dark = false }) => {
  return (
    <div className="lb">
      <div className="lb-stage" style={dark ? {background: "var(--ink)"} : {}}>
        <div className="lb-mark-row">
          <div style={{display: "grid", placeItems: "center"}}>{children}</div>
          {wordmark && <div style={{display: "flex", flexDirection: "column", gap: 4}}>{wordmark}</div>}
        </div>
      </div>
      <div className="lb-foot">
        <div className="lb-foot-l">
          <div className="lb-favi">{small}</div>
          <span className="lb-tag">24PX · FAVICON</span>
        </div>
        <div className="lb-note">{note}</div>
      </div>
    </div>
  );
};

// Helper: the radial "orb" the product already uses
const Orb = ({ size = 40, from = "#6366F1", to = "#4338CA", ring = false }) => (
  <div style={{
    width: size, height: size, borderRadius: "50%",
    background: `radial-gradient(circle at 30% 28%, ${from}, ${to})`,
    boxShadow: ring ? `0 0 0 6px rgba(99,102,241,0.12)` : "none",
  }} />
);

// ==========================================================
// CONCEPT 1 — "Orb + Counterweight"
// Pulls the product's existing orb language forward;
// pairs it with a small tick/dot to suggest dialogue (two voices)
// ==========================================================
const Concept1 = () => {
  const Mark = ({ s = 1 }) => (
    <svg width={64*s} height={64*s} viewBox="0 0 64 64">
      <defs>
        <radialGradient id="c1-orb" cx="30%" cy="28%">
          <stop offset="0%" stopColor="#6366F1"/>
          <stop offset="100%" stopColor="#4338CA"/>
        </radialGradient>
      </defs>
      <circle cx="24" cy="32" r="20" fill="url(#c1-orb)"/>
      <circle cx="52" cy="32" r="6" fill="#2A2724"/>
    </svg>
  );
  const Wordmark = (
    <div className="wm-inter" style={{fontSize: 32, lineHeight: 1}}>
      Data<span className="p">Praat</span>
    </div>
  );
  return (
    <LogoBoard
      note={<><b>01 · Tweespraak.</b> Grote orb = data. Kleine punt = de vraag. Het kleine duwt het grote aan het praten.</>}
      small={<Mark s={0.32}/>}
      wordmark={Wordmark}
    >
      <Mark s={1}/>
    </LogoBoard>
  );
};

// ==========================================================
// CONCEPT 2 — "Speech Bubble Chart"
// Speech bubble where the tail ends in a small rising bar-chart —
// literal "data + talk"
// ==========================================================
const Concept2 = () => {
  const Mark = ({ s = 1 }) => (
    <svg width={72*s} height={64*s} viewBox="0 0 72 64">
      {/* bubble */}
      <path
        d="M10 6 h44 a8 8 0 0 1 8 8 v28 a8 8 0 0 1 -8 8 h-20 l-10 10 v-10 h-14 a8 8 0 0 1 -8 -8 v-28 a8 8 0 0 1 8 -8 z"
        fill="#4338CA"
      />
      {/* bars inside */}
      <rect x="18" y="30" width="6" height="12" fill="#FAF7EF" rx="1"/>
      <rect x="28" y="22" width="6" height="20" fill="#FAF7EF" rx="1"/>
      <rect x="38" y="16" width="6" height="26" fill="#FAF7EF" rx="1"/>
      <rect x="48" y="26" width="6" height="16" fill="#A8702A" rx="1"/>
    </svg>
  );
  const Wordmark = (
    <div className="wm-inter" style={{fontSize: 30, lineHeight: 1}}>DataPraat</div>
  );
  return (
    <LogoBoard
      note={<><b>02 · Gesprek met cijfers.</b> Tekstballon waarin de staafjes de zin maken. Eén staaf in amber — de uitschieter die aandacht vraagt.</>}
      small={<Mark s={0.28}/>}
      wordmark={Wordmark}
    >
      <Mark s={1}/>
    </LogoBoard>
  );
};

// ==========================================================
// CONCEPT 3 — "The Quote Orb"
// Orb with a single curly quotation mark cut out — quiet, elegant
// ==========================================================
const Concept3 = () => {
  const Mark = ({ s = 1 }) => (
    <svg width={64*s} height={64*s} viewBox="0 0 64 64">
      <defs>
        <radialGradient id="c3-orb" cx="32%" cy="30%">
          <stop offset="0%" stopColor="#6366F1"/>
          <stop offset="100%" stopColor="#4338CA"/>
        </radialGradient>
        <mask id="c3-m">
          <rect width="64" height="64" fill="white"/>
          {/* quote */}
          <path d="M24 22 q-6 2 -6 10 h6 v8 h-10 v-10 q0 -12 10 -14 z M40 22 q-6 2 -6 10 h6 v8 h-10 v-10 q0 -12 10 -14 z" fill="black"/>
        </mask>
      </defs>
      <circle cx="32" cy="32" r="28" fill="url(#c3-orb)" mask="url(#c3-m)"/>
    </svg>
  );
  const Wordmark = (
    <div className="wm-fraunces" style={{fontSize: 34, lineHeight: 1}}>DataPraat</div>
  );
  return (
    <LogoBoard
      note={<><b>03 · Citaat.</b> De orb spreekt zelf — aanhalingstekens snijden erin. Bedachtzaam, academisch, past bij de verhalenmodus.</>}
      small={<Mark s={0.3}/>}
      wordmark={Wordmark}
    >
      <Mark s={1}/>
    </LogoBoard>
  );
};

// ==========================================================
// CONCEPT 4 — "Scatter / Constellation"
// Dots + a single connecting line; reads as data points
// beginning to "talk" to each other
// ==========================================================
const Concept4 = () => {
  const Mark = ({ s = 1 }) => (
    <svg width={72*s} height={64*s} viewBox="0 0 72 64">
      {/* connecting polyline */}
      <polyline
        points="10,50 24,36 40,42 56,18"
        fill="none"
        stroke="#4338CA"
        strokeWidth="2.5"
        strokeLinecap="round"
        strokeLinejoin="round"
      />
      {/* data points */}
      <circle cx="10" cy="50" r="4" fill="#2A2724"/>
      <circle cx="24" cy="36" r="4" fill="#2A2724"/>
      <circle cx="40" cy="42" r="4" fill="#2A2724"/>
      <circle cx="56" cy="18" r="5.5" fill="#4338CA"/>
      {/* speech dot — tiny orb above the end */}
      <circle cx="64" cy="10" r="2.5" fill="#A8702A"/>
    </svg>
  );
  const Wordmark = (
    <div className="wm-inter" style={{fontSize: 30, lineHeight: 1, fontWeight: 500}}>DataPraat</div>
  );
  return (
    <LogoBoard
      note={<><b>04 · Lijn van vier punten.</b> Trend + commentaar. De amber stip boven is de aha-moment, het inzicht dat uit de cijfers "praat".</>}
      small={<Mark s={0.28}/>}
      wordmark={Wordmark}
    >
      <Mark s={1}/>
    </LogoBoard>
  );
};

// ==========================================================
// CONCEPT 5 — "DP Monogram in a Rounded Square"
// Classic app-icon look; the P's bowl is a tiny orb
// ==========================================================
const Concept5 = () => {
  const Mark = ({ s = 1 }) => (
    <svg width={64*s} height={64*s} viewBox="0 0 64 64">
      <defs>
        <radialGradient id="c5-bg" cx="30%" cy="20%">
          <stop offset="0%" stopColor="#5A4FE0"/>
          <stop offset="100%" stopColor="#4338CA"/>
        </radialGradient>
      </defs>
      <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#c5-bg)"/>
      {/* Custom DP wordlet */}
      <text x="32" y="44"
            textAnchor="middle"
            fontFamily="Inter, sans-serif"
            fontSize="30"
            fontWeight="700"
            fill="#FAF7EF"
            letterSpacing="-0.02em">Dp</text>
      {/* little orb nestled as a dot */}
      <circle cx="48" cy="20" r="3.5" fill="#FBBF24"/>
    </svg>
  );
  const Wordmark = (
    <div className="wm-inter" style={{fontSize: 30, lineHeight: 1}}>
      Data<span className="p">Praat</span>
    </div>
  );
  return (
    <LogoBoard
      note={<><b>05 · Monogram.</b> Nederlands "Dp" op rounded-square — werkt als app-icoon. Kleine gouden stip voor het insight-moment.</>}
      small={<Mark s={0.32}/>}
      wordmark={Wordmark}
    >
      <Mark s={1}/>
    </LogoBoard>
  );
};

// ==========================================================
// CONCEPT 6 — "Soundwave"
// Abstract set of vertical bars that could read as a
// bar-chart OR a waveform (the "praat" half)
// ==========================================================
const Concept6 = () => {
  const Mark = ({ s = 1 }) => {
    const heights = [12, 22, 32, 44, 32, 50, 28, 18];
    return (
      <svg width={72*s} height={60*s} viewBox="0 0 72 60">
        {heights.map((h, i) => (
          <rect
            key={i}
            x={4 + i * 8}
            y={30 - h/2}
            width="5"
            height={h}
            rx="2.5"
            fill={i === 5 ? "#A8702A" : i === 3 ? "#4338CA" : "#2A2724"}
          />
        ))}
      </svg>
    );
  };
  const Wordmark = (
    <div className="wm-inter" style={{fontSize: 30, lineHeight: 1, letterSpacing: "-0.03em"}}>
      data<span style={{color: "var(--primary)"}}>·</span>praat
    </div>
  );
  return (
    <LogoBoard
      note={<><b>06 · Waveform.</b> Leest als staafjes én als spraak-signaal. De punt in het wordmark = de orb op ooghoogte.</>}
      small={<Mark s={0.28}/>}
      wordmark={Wordmark}
    >
      <Mark s={1}/>
    </LogoBoard>
  );
};

// ==========================================================
// CONCEPT 7 — "The Colon"
// Typographic: two dots (the colon — "here come the numbers")
// set against a serifed wordmark. Quiet editorial vibe.
// ==========================================================
const Concept7 = () => {
  const Mark = ({ s = 1 }) => (
    <svg width={32*s} height={64*s} viewBox="0 0 32 64">
      <circle cx="16" cy="22" r="8" fill="#4338CA"/>
      <circle cx="16" cy="46" r="8" fill="#2A2724"/>
    </svg>
  );
  const Wordmark = (
    <div className="wm-fraunces" style={{fontSize: 36, lineHeight: 1, fontWeight: 500, fontStyle: "italic"}}>
      DataPraat
    </div>
  );
  return (
    <LogoBoard
      note={<><b>07 · Dubbele punt.</b> Typografisch minimum — het teken dat altijd voor cijfers staat: "Zorg: 14,2 mln." Redactioneel, Fraunces-cursief.</>}
      small={<Mark s={0.3}/>}
      wordmark={Wordmark}
    >
      <Mark s={1}/>
    </LogoBoard>
  );
};

// ==========================================================
// CONCEPT 8 — "Two Orbs, One Line"
// Dialogue between two entities — you and the data — joined
// by a baseline. The whole product philosophy in two dots.
// ==========================================================
const Concept8 = () => {
  const Mark = ({ s = 1 }) => (
    <svg width={88*s} height={48*s} viewBox="0 0 88 48">
      <line x1="6" y1="24" x2="82" y2="24" stroke="#D4D1CB" strokeWidth="1.5"/>
      <circle cx="18" cy="24" r="12" fill="#2A2724"/>
      <defs>
        <radialGradient id="c8-orb" cx="30%" cy="28%">
          <stop offset="0%" stopColor="#6366F1"/>
          <stop offset="100%" stopColor="#4338CA"/>
        </radialGradient>
      </defs>
      <circle cx="70" cy="24" r="16" fill="url(#c8-orb)"/>
    </svg>
  );
  const Wordmark = (
    <div className="wm-inter" style={{fontSize: 30, lineHeight: 1, fontWeight: 600}}>
      DataPraat
    </div>
  );
  return (
    <LogoBoard
      note={<><b>08 · Twee orbs.</b> Jij en de data op één lijn. Inhoudelijk de kern van het product — een gesprek, niet een dashboard.</>}
      small={<Mark s={0.22}/>}
      wordmark={Wordmark}
    >
      <Mark s={1}/>
    </LogoBoard>
  );
};

// ==========================================================
// CONCEPT 9 — "Aperture / Lens"
// Concentric segments — references the "Toon als…" lens picker.
// Each lens shows the same data differently.
// ==========================================================
const Concept9 = () => {
  const Mark = ({ s = 1 }) => (
    <svg width={64*s} height={64*s} viewBox="0 0 64 64">
      {/* outer ring */}
      <circle cx="32" cy="32" r="28" fill="none" stroke="#2A2724" strokeWidth="2"/>
      {/* aperture blades — 6 segments */}
      {[0, 60, 120, 180, 240, 300].map((deg, i) => (
        <path
          key={i}
          d="M 32 32 L 32 6 A 26 26 0 0 1 54.5 19 Z"
          fill={i % 2 === 0 ? "#4338CA" : "#6366F1"}
          opacity={i === 0 ? 1 : (0.85 - i * 0.1)}
          transform={`rotate(${deg} 32 32)`}
        />
      ))}
      <circle cx="32" cy="32" r="6" fill="#FCFBF8"/>
    </svg>
  );
  const Wordmark = (
    <div className="wm-inter" style={{fontSize: 30, lineHeight: 1, fontWeight: 600, letterSpacing: "-0.025em"}}>
      DataPraat
    </div>
  );
  return (
    <LogoBoard
      note={<><b>09 · Lens.</b> Diafragma-bladen verwijzen naar "Toon als…" — dezelfde data, andere blik. Roteerbaar als loader-state.</>}
      small={<Mark s={0.3}/>}
      wordmark={Wordmark}
    >
      <Mark s={1}/>
    </LogoBoard>
  );
};

// ==========================================================
// CONCEPT 10 — "Wordmark-first: the orb IS the A-dot"
// No separate mark. The dot on the 'a' of Praat becomes the orb.
// Most restrained and most sophisticated option.
// ==========================================================
const Concept10 = () => {
  const Mark = ({ s = 1 }) => (
    <div style={{
      fontFamily: "Inter, sans-serif",
      fontWeight: 700,
      fontSize: 44 * s,
      letterSpacing: "-0.035em",
      lineHeight: 1,
      color: "var(--ink)",
      display: "inline-flex",
      alignItems: "baseline",
      position: "relative",
    }}>
      DataPra<span style={{position: "relative", display: "inline-block"}}>
        a
        <span style={{
          position: "absolute",
          top: 6 * s, right: -6 * s,
          width: 10 * s, height: 10 * s,
          borderRadius: "50%",
          background: "radial-gradient(circle at 30% 28%, #6366F1, #4338CA)",
        }}/>
      </span>t
    </div>
  );
  const Small = () => (
    <div style={{
      fontFamily: "Inter, sans-serif",
      fontWeight: 800,
      fontSize: 14,
      letterSpacing: "-0.05em",
      lineHeight: 1,
      color: "var(--ink)",
      position: "relative",
      display: "inline-flex",
      alignItems: "baseline",
    }}>
      Dp
      <span style={{
        width: 4, height: 4, borderRadius: "50%",
        background: "radial-gradient(circle at 30% 28%, #6366F1, #4338CA)",
        marginLeft: 1, alignSelf: "flex-start", marginTop: 2,
      }}/>
    </div>
  );
  return (
    <LogoBoard
      note={<><b>10 · Wordmark-only.</b> Geen apart symbool — de orb is de punt van de 'a' in Praat. Meest ingetogen; werkt sterk als pure typografie.</>}
      small={<Small/>}
      wordmark={null}
    >
      <Mark s={1}/>
    </LogoBoard>
  );
};

// ==========================================================
// CONCEPT 11 — "Orb Eclipse"
// Two orbs overlapping — indigo + ink — like an eclipse.
// Single-color wordmark in ink.
// ==========================================================
const Concept11 = () => {
  const Mark = ({ s = 1 }) => (
    <svg width={68*s} height={48*s} viewBox="0 0 68 48">
      <defs>
        <radialGradient id="c11-orb" cx="30%" cy="28%">
          <stop offset="0%" stopColor="#6366F1"/>
          <stop offset="100%" stopColor="#4338CA"/>
        </radialGradient>
      </defs>
      <circle cx="24" cy="24" r="20" fill="url(#c11-orb)"/>
      <circle cx="44" cy="24" r="20" fill="#2A2724"/>
    </svg>
  );
  const Wordmark = (
    <div className="wm-inter" style={{fontSize: 30, lineHeight: 1, color: "var(--ink)"}}>
      DataPraat
    </div>
  );
  return (
    <LogoBoard
      note={<><b>11 · Eclips.</b> Twee orbs overlappen — data en gesprek smelten samen. Naam in één kleur (ink), mark doet het werk.</>}
      small={<Mark s={0.3}/>}
      wordmark={Wordmark}
    >
      <Mark s={1}/>
    </LogoBoard>
  );
};

// ==========================================================
// CONCEPT 12 — "Orb Cluster"
// Three orbs in a triangular cluster — reads as stakeholders
// talking, or as a molecular diagram.
// ==========================================================
const Concept12 = () => {
  const Mark = ({ s = 1 }) => (
    <svg width={64*s} height={56*s} viewBox="0 0 64 56">
      <defs>
        <radialGradient id="c12-a" cx="30%" cy="28%">
          <stop offset="0%" stopColor="#8B8FFF"/>
          <stop offset="100%" stopColor="#4338CA"/>
        </radialGradient>
        <radialGradient id="c12-b" cx="30%" cy="28%">
          <stop offset="0%" stopColor="#6366F1"/>
          <stop offset="100%" stopColor="#3151B0"/>
        </radialGradient>
      </defs>
      <line x1="16" y1="40" x2="48" y2="40" stroke="#D4D1CB" strokeWidth="1.5"/>
      <line x1="32" y1="14" x2="16" y2="40" stroke="#D4D1CB" strokeWidth="1.5"/>
      <line x1="32" y1="14" x2="48" y2="40" stroke="#D4D1CB" strokeWidth="1.5"/>
      <circle cx="32" cy="14" r="10" fill="url(#c12-a)"/>
      <circle cx="16" cy="40" r="8" fill="url(#c12-b)"/>
      <circle cx="48" cy="40" r="8" fill="#2A2724"/>
    </svg>
  );
  const Wordmark = (
